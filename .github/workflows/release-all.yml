name: Build & Release (Android + Electron + iOS)

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build node files/capacitor
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Build env
        env:
          CI: ''
        run: |
          chmod +x android-build-debug.sh
          ./android-build-debug.sh

      # JDK
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # Set up Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.1
        with:
          api-level: 33
          build-tools-version: 33.0.2

      - name: Decode Android keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build with Gradle
        run: |
          cd android
          ./gradlew clean assembleRelease

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  electron:
    name: Electron
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
      fail-fast: false # don't cancel one OS build if the other fails

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build Electron app
        run: pnpm run electron:build
        env:
          CI: ''
          DISABLE_ESLINT_PLUGIN: true

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-${{ matrix.os }}
          path: electron-dist/

  ios:
    name: iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build the React app
        run: pnpm run build

      - name: Sync with Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath $PWD/build/App.xcarchive

      - name: Export .ipa File
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist ios/App/exportOptions.plist

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/App/build/App.ipa

  release:
    name: Create combined GitHub Release
    runs-on: ubuntu-latest
    needs: [android, electron, ios]
    if: always() # run even if some builds fail

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          if-no-files-found: ignore

      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=UserBuild_$(date +'%Y.%m.%d_%H-%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          draft: false
          prerelease: false
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
