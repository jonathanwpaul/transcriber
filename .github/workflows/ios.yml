name: Build iOS App

on:
  push:
    branches: ['master']

jobs:
  build-ios:
    runs-on: macos-latest # Use GitHub's macOS runner (requires a macOS environment)

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18 # Use the Node.js version your app requires

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          npm install

      # Step 4: Build the web app
      - name: Build the React app
        run: |
          npm run build

      # Step 5: Sync with Capacitor
      - name: Sync with Capacitor
        run: |
          npx cap sync ios

      # Step 6: Install CocoaPods dependencies
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      # Step 7: Build the iOS app
      - name: Build iOS App
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath $PWD/build/App.xcarchive

      # Step 8: Export the .ipa file
      - name: Export .ipa File
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist ios/App/exportOptions.plist

      # Step 9: Upload artifacts (optional)
      - name: Upload .ipa file
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: ios/App/build/App.ipa
